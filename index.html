<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>
    <link rel="icon" href="img/favicon/favicon.png">

    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/small-chicken.class.js"></script>
    <script src="models/clouds.class.js"></script>
    <script src="models/chicken-house.class.js"></script>
    <script src="models/health-status-bar.class.js"></script>
    <script src="models/coin-bar.class.js"></script>
    <script src="models/bottle-bar.class.js"></script>
    <script src="models/endboss-health-bar.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/collectable-objects.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/coins.class.js"></script>
    <script src="models/bottle.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="js/game.js"></script>
</head>

<body>
    <h1>El Pollo Loco</h1>

    <!-- Neues Overlay für Portrait-Modus -->
    <div id="rotate-device-overlay" class="rotate-overlay dNone">
        <div class="rotate-content">
            <svg width="80" height="80" viewBox="0 0 100 100" class="rotate-icon">
                <rect x="20" y="35" width="35" height="60" rx="8" fill="#ffdf00" stroke="#9a3a16" stroke-width="3" />
                <polygon points="70,50 85,65 70,80" fill="#9a3a16" />
                <path d="M 75 40 A 20 20 0 0 1 95 60" stroke="#9a3a16" stroke-width="3" fill="none" />
            </svg>
            <h2>Turn Your Device</h2>
            <p>Please rotate your device to landscape mode to play</p>
        </div>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls" class="mobile-controls dNone">
        <div class="control-left">
            <button class="control-btn" id="btn-left">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <polygon points="25,10 15,20 25,30" fill="#ffdf00" stroke="#9a3a16" stroke-width="2" />
                </svg>
            </button>
            <button class="control-btn" id="btn-right">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <polygon points="15,10 25,20 15,30" fill="#ffdf00" stroke="#9a3a16" stroke-width="2" />
                </svg>
            </button>
        </div>
        <div class="control-right">
            <button class="control-btn" id="btn-jump">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <polygon points="20,10 10,25 30,25" fill="#ffdf00" stroke="#9a3a16" stroke-width="2" />
                </svg>
            </button>
            <button class="control-btn" id="btn-throw">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="15" fill="#ffdf00" stroke="#9a3a16" stroke-width="2" />
                    <text x="20" y="25" text-anchor="middle" fill="#9a3a16" font-size="12" font-weight="bold">T</text>
                </svg>
            </button>
        </div>
    </div>

    <div id="content" class="main_content" width="720" height="480">
        <div id="iconBar" class="icon_bar dNone">
            <div>
                <img src="img/icons/home.png" alt="frontPage" onclick="window.location.reload()">
            </div>
            <div id="soundOn" onclick="turnOffMusic()">
                <img src="img/icons/sound-on.png" alt="sound-on">
            </div>
            <div id="soundOff" class="dNone" onclick="turnOnMusic()">
                <img src="img/icons/sound-off.png" alt="sound-off">
            </div>
            <div id="fullscreen">
                <img src="img/icons/full-screen-icon.png" alt="fullScreen" onclick="fullscreen()">
            </div>
        </div>
        <div id="overlay" class="start-screen">
            <div class="game-buttons">
                <img src="img/icons/start-game.png" onclick="startGame()">
            </div>
            <img src="img/9_intro_outro_screens/start/startscreen_1.png" width="720" height="480">
        </div>

        <div id="winning_overlay" class="winning-screen dNone">
            <div id="winningScreenIconBar" class="game-buttons dNone">
                <div id="frontPage">
                    <img src="img/icons/return-to-home.png" alt="frontPage" onclick="window.location.reload()">
                </div>
            </div>
            <img src="img/You won, you lost/You won A.png" width="720" height="480">
            <div>
                <h2 id="end_title"></h2>
            </div>
        </div>
        <div id="losing_overlay" class="losing-screen dNone">
            <div id="losingScreenIconBar" class="game-buttons dNone">
                <div id="frontPage">
                    <img src="img/icons/return-to-home.png" alt="frontPage" onclick="window.location.reload()">
                </div>
            </div>
            <img src="img/You won, you lost/You lost.png" width="720" height="480">
            <div>
                <h2 id="end_title"></h2>
            </div>
        </div>


        <canvas id="canvas" width="720" height="480" class="dNone">
        </canvas>

        <div class="instructions_box">
            <!-- <h2>Instructions:</h2> -->
            <div class="instructions_svg">
                <!-- Pfeiltasten Links/Rechts -->
                <div class="instruction_item">
                    <svg width="90" height="60" viewBox="0 0 60 35">
                        <!-- Linke Pfeiltaste -->
                        <rect x="3" y="8" width="24" height="24" rx="4" fill="#ffdf00" stroke="#9a3a16"
                            stroke-width="1" />
                        <polygon points="10,20 18,16 18,24" fill="#9a3a16" />

                        <!-- Rechte Pfeiltaste -->
                        <rect x="33" y="8" width="24" height="24" rx="4" fill="#ffdf00" stroke="#9a3a16"
                            stroke-width="1" />
                        <polygon points="50,20 42,16 42,24" fill="#9a3a16" />
                    </svg>
                    <p>Move Left/Right</p>
                </div>

                <!-- Pfeiltaste Hoch -->
                <div class="instruction_item">
                    <svg width="60" height="60" viewBox="0 0 40 30">
                        <rect x="8" y="5" width="24" height="24" rx="4" fill="#ffdf00" stroke="#9a3a16"
                            stroke-width="1" />
                        <polygon points="20,12 16,20 24,20" fill="#9a3a16" />
                    </svg>
                    <p>Jump</p>
                </div>

                <!-- Leertaste -->
                <div class="instruction_item">
                    <svg width="120" height="60" viewBox="0 0 80 40">
                        <rect x="8" y="14" width="64" height="16" rx="4" fill="#ffdf00" stroke="#9a3a16"
                            stroke-width="1" />
                        <text x="40" y="26" text-anchor="middle" fill="#9a3a16" font-family="Arial" font-size="10"
                            font-weight="bold">SPACE</text>
                    </svg>
                    <p>Throw Bottle</p>
                </div>
            </div>
        </div>

            <h2>Instructions :</h2>

                <p>Arrows Left/Right: move left/right</p>

                <p>Space: throw bottle</p>
            </div>
        </div>
    </div> -->

</body>

</html>
