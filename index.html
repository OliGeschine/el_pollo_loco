<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>
    <link rel="icon" href="img/favicon/favicon.png">

    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/small-chicken.class.js"></script>
    <script src="models/clouds.class.js"></script>
    <script src="models/health-status-bar.class.js"></script>
    <script src="models/coin-bar.class.js"></script>
    <script src="models/bottle-bar.class.js"></script>
    <script src="models/endboss-health-bar.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/collectable-objects.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/coins.class.js"></script>
    <script src="models/bottle.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="js/game.js"></script>
</head>

<body>
    <h1>El Pollo Loco</h1>


    <div id="content" class="main_content" width="720" height="480">
        <div id="iconBar" class="icon_bar dNone">
            <div id="frontPage">
                <img src="img/icons/home.png" alt="frontPage" onclick="window.location.reload()">
            </div>
            <div id="soundOn" onclick="turnOffMusic()">
                <img src="img/icons/sound-on.png" alt="sound-on">
            </div>
            <div id="soundOff" class="dNone" onclick="turnOnMusic()">
                <img src="img/icons/sound-off.png" alt="sound-off">
            </div>
            <div id="fullscreen">
                <img src="img/icons/full-screen-icon.png" alt="fullScreen" onclick="fullscreen()">
            </div>
        </div>
        <div id="overlay" class="start-screen">
            <div class="game-buttons">
                <img src="img/icons/start-game.png" onclick="startGame()">
                <img src="img/icons/full-screen-icon.png" alt="fullScreen" onclick="fullscreen()">
            </div>
            <img src="img/9_intro_outro_screens/start/startscreen_1.png" width="720" height="480">
        </div>

        <div id="end_overlay" class="end-screen dNone">
            <div id="endscreenIconBar" class="game-buttons dNone">
                <div id="frontPage">
                    <img src="img/icons/return-to-home.png" alt="frontPage" onclick="window.location.reload()">
                </div>
            </div>
            <img src="img/You won, you lost/You won A.png" width="720" height="480">
            <div>
                <h2 id="end_title"></h2>
            </div>
        </div>


        <canvas id="canvas" width="720" height="480" class="dNone">
        </canvas>

        <div class="instructions_box">
            <h2>Instructions :</h2>
            <div class="instructions">
                <p>Arrows Left/Right: move left/right</p>
                <p>Arrow Up: jump</p>
                <p>Space: throw bottle</p>
            </div>
        </div>
    </div>


</body>

</html>
